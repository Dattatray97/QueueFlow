version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: queueflow-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: queueflow_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - queueflow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: queueflow-backend
    restart: always
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/queueflow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - mysql
    networks:
      - queueflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: queueflow-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - queueflow-network

volumes:
  mysql_data:

networks:
  queueflow-network:
    driver: bridge
